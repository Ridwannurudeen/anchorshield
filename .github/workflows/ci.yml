name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.96.0 --profile minimal --component rustfmt --component clippy --target wasm32v1-none
          rustup default 1.96.0

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --version 27.0.0 || cargo install --locked stellar-cli

      - name: Install circom
        run: |
          git clone --depth 1 --branch v2.2.3 https://github.com/iden3/circom.git /tmp/circom
          cargo install --path /tmp/circom/circom

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Contract wasm build
        run: cargo build --workspace --target wasm32v1-none --release

      - name: Full verification (JS checks, audit, circuit, off-chain, Rust tests)
        run: npm run m5:verify

      - name: SDK / CLI / bindings verification
        run: npm run m6:verify
